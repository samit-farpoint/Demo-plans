<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Mockup - Category States</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 40px;
            margin: 0;
        }
        .mockup-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }
        .section {
            background: #2d2d2d;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
        }
        .section-title {
            font-size: 14px;
            color: #9e9e9e;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #fff;
            border-radius: 8px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .category-item {
            background: #e8eaf6;
            border-left: 4px solid #3f51b5;
        }
        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #3f51b5;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .checkbox.checked {
            background: #3f51b5;
        }
        .checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
        }
        .chevron {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3f51b5;
            font-size: 16px;
            flex-shrink: 0;
        }
        .icon {
            font-size: 18px;
            flex-shrink: 0;
        }
        .title {
            flex: 1;
            font-size: 15px;
            color: #333;
        }
        .title.completed {
            text-decoration: line-through;
            color: #9e9e9e;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }
        .btn-edit {
            background: #2196f3;
            color: white;
        }
        .btn-delete {
            background: #f44336;
            color: white;
        }
        .children-container {
            margin-left: 36px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .child-item {
            background: #f5f5f5;
            border-left: 3px solid #9e9e9e;
        }
    </style>
</head>
<body>
    <div class="mockup-container">
        <!-- Expanded Category -->
        <div class="section">
            <div class="section-title">Expanded Category</div>
            
            <div class="todo-item category-item">
                <div class="chevron">▼</div>
                <div class="icon">📁</div>
                <div class="title">Project Setup</div>
                <div class="actions">
                    <button class="btn btn-edit">Edit</button>
                    <button class="btn btn-delete">Delete</button>
                </div>
            </div>
            
            <div class="children-container">
                <div class="todo-item child-item">
                    <div class="checkbox"></div>
                    <div class="title">Set up repository</div>
                    <div class="actions">
                        <button class="btn btn-edit">Edit</button>
                        <button class="btn btn-delete">Delete</button>
                    </div>
                </div>
                
                <div class="todo-item child-item">
                    <div class="checkbox checked"></div>
                    <div class="title completed">Configure CI/CD</div>
                    <div class="actions">
                        <button class="btn btn-edit">Edit</button>
                        <button class="btn btn-delete">Delete</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Collapsed Category -->
        <div class="section">
            <div class="section-title">Collapsed Category</div>
            
            <div class="todo-item category-item">
                <div class="chevron">▶</div>
                <div class="icon">📁</div>
                <div class="title">Documentation</div>
                <div class="actions">
                    <button class="btn btn-edit">Edit</button>
                    <button class="btn btn-delete">Delete</button>
                </div>
            </div>
        </div>
        
        <!-- Regular Todo -->
        <div class="section">
            <div class="section-title">Regular Todo (no parent)</div>
            
            <div class="todo-item">
                <div class="checkbox checked"></div>
                <div class="title completed">Initial commit</div>
                <div class="actions">
                    <button class="btn btn-edit">Edit</button>
                    <button class="btn btn-delete">Delete</button>
                </div>
            </div>
            
            <div class="todo-item">
                <div class="checkbox"></div>
                <div class="title">Write tests</div>
                <div class="actions">
                    <button class="btn btn-edit">Edit</button>
                    <button class="btn btn-delete">Delete</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
